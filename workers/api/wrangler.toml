name = "ie-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# ── D1 Database ──
[[d1_databases]]
binding = "DB"
database_name = "ie-db"
database_id = "337f8162-603c-4347-8e26-4ea0ca9aed93"

# ── R2 Bucket ──
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "ie-media"

# ── Secrets ──
# Set with: wrangler secret put ANTHROPIC_API_KEY
# Then paste your key from console.anthropic.com
